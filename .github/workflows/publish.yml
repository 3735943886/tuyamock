name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published (tag a release, e.g.
# v0.1.0, then "Publish release"). Uses PyPI Trusted Publishing (OIDC) — no API
# token/secret required. One-time setup on PyPI:
#   PyPI -> project "tuyamock" -> Settings -> Publishing -> add a trusted
#   publisher: owner=<your gh user/org>, repo=tuyamock,
#   workflow=publish.yml, environment=pypi.
# (Token fallback: drop the OIDC bits and pass
#  `with: password: ${{ secrets.PYPI_API_TOKEN }}` to the publish step.)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test deps
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[test]"

      - name: Run tests (release gate)
        run: pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tuyamock
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
